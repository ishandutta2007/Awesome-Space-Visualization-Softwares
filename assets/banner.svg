<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1021">
        <animate attributeName="stop-color" values="#0b1021; #1a0b2e; #0b1021" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#1b2735">
        <animate attributeName="stop-color" values="#1b2735; #000000; #1b2735" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <g id="stars">
    <circle cx="100" cy="50" r="1.5" fill="#fff">
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="250" cy="120" r="2" fill="#fff">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="40" r="1" fill="#fff">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="150" r="2.5" fill="#fff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="180" r="1.2" fill="#fff">
      <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Shooting Star -->
  <g>
    <line x1="800" y1="0" x2="700" y2="100" stroke="url(#starGlow)" stroke-width="2">
      <animate attributeName="x1" values="800;-100" dur="5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="900;0" dur="5s" repeatCount="indefinite" />
      <animate attributeName="y1" values="0;450" dur="5s" repeatCount="indefinite" />
      <animate attributeName="y2" values="-100;350" dur="5s" repeatCount="indefinite" />
    </line>
  </g>

  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Awesome Space Visualization Softwares
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
  </text>
  <text x="50%" y="70%" font-family="Arial, sans-serif" font-size="18" font-weight="normal" fill="#aaaaaa" text-anchor="middle" dominant-baseline="middle">
    Top Tools for Exploring the Universe
  </text>
</svg>
